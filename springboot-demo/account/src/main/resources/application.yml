spring:
  rsocket:
    server:
      transport: websocket
#      transport: tcp
      port: 6000
      mapping-path: /account
  r2dbc:
    url: ${dbUrl}
    username: ${dbUsername}
    password: ${dbPassword}
    pool:
      enabled: true
      initial-size: 10
      max-size: 50

security-settings:
  auth-client:
    name: ${authClientName}
    id: ${authClientId}
    secret: ${authClientPassword}
  permit-routes:
    greet: anonymous.greet
    login: anonymous.login

