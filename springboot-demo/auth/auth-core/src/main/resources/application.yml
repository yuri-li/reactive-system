spring:
  rsocket:
    server:
      transport: websocket
      port: 6001
      mapping-path: /auth
  redis:
    host: ${redisIp}
    port: ${redisPort}
    username: ${redisUsername}
    password: ${redisPassword}

security-settings:
  auth-client:
    name: auth-core
    id: 43e8334a-b9b5-44bd-92cd-8afefa021bae
    secret: "yV!wj?aI.Kc?3BZZd[BJh=Z"
  permit-routes:
    generateToken: anonymous.auth.generate.token
    getAuthentication: anonymous.auth.get.authentication
    refreshToken: anonymous.auth.refresh.token

#Admin, SubAccount, Employer, Applicant, Guest
